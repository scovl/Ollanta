# Shared local development configuration for Ollanta.
# Scanner CLI flags and OLLANTA_* environment variables still override these values.

[scanner]
project_dir = "."
sources = ["./..."]
exclusions = []
format = "all"
serve = true
bind = "127.0.0.1"
port = 7777
server_token = "ollanta-dev-scanner-token"
server_wait = false
server_wait_timeout = "10m"
server_wait_poll = "2s"

[server]
# Internal listen address for ollantaweb.
host = "0.0.0.0"
port = 8080

# External/local URL used by the scanner when pushing to the centralized API.
public_url = "http://localhost:8080"

search_backend = "zincsearch"
log_level = "info"
scanner_token = "ollanta-dev-scanner-token"
jwt_expiry = "15m"
refresh_expiry = "720h"

[database]
host = "localhost"
port = 5432
name = "ollanta"
user = "ollanta"
password = "ollanta_dev"
sslmode = "disable"

[search]
scheme = "http"
host = "localhost"
port = 4080
user = "admin"
password = "ollanta_dev"

[oauth.github]
client_id = ""
client_secret = ""

[oauth.gitlab]
client_id = ""
client_secret = ""

[oauth.google]
client_id = ""
client_secret = ""
