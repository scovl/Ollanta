version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - misspell
    - revive
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
  exclusions:
    rules:
      # Model/port types are self-documenting by naming convention.
      - linters: [revive]
        path: domain/
      - linters: [revive]
        path: application/
      # Interface implementations don't need per-method comments.
      - linters: [revive]
        text: 'exported method .* should have comment'
      # defer f.Close() ignoring the error is the standard Go pattern.
      - linters: [errcheck]
        text: 'Error return value of `.*\.Close` is not checked'
      # TreeSitterSensor in package treesitter is a deliberate name choice.
      - linters: [revive]
        text: 'stutters'
      # Version constant in report package is self-documenting.
      - linters: [revive]
        text: 'exported const Version'
      # Pre-existing ineffectassign in scm.go — scope is intentional.
      - linters: [ineffassign]
        path: application/scan/scm.go
      # Pre-existing staticcheck simplifications (not in my changes).
      - linters: [staticcheck]
        path: application/ingest/usecase.go
      - linters: [staticcheck]
        path: application/scan/mutations.go
      - linters: [staticcheck]
        path: application/scan/testsignals_collect.go
      # Pre-existing unused function.
      - linters: [unused]
        path: application/scan/testsignals_parse.go
      # Pre-existing issues in ollantastore/postgres (not my changes).
      - linters: [revive, errcheck, ineffassign, unused]
        path: ollantastore/postgres/
      # Pre-existing issues in ollantaweb (not my changes).
      - linters: [all]
        path: ollantaweb/
